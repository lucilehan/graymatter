name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Package VSIX (dry run)
        run: npx @vscode/vsce package --no-dependencies -o test.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: graymatter-vsix
          path: "*.vsix"
