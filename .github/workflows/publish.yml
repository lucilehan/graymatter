name: Publish Extension

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Package VSIX
        run: npx @vscode/vsce package --no-dependencies -o graymatter-${{ steps.version.outputs.VERSION }}.vsix

      - name: Publish to VS Code Marketplace
        run: npx @vscode/vsce publish --no-dependencies -p ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        continue-on-error: true
        run: npx ovsx publish graymatter-${{ steps.version.outputs.VERSION }}.vsix -p ${{ secrets.OVSX_PAT }}

      - name: Get latest commit message
        id: commit
        run: echo "MSG=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "*.vsix"
          generate_release_notes: true
          name: "${{ steps.commit.outputs.MSG }}"
